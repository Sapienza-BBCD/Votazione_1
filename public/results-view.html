<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Risultati in Diretta - LAB2GO</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background-color: #0d6efd;
  color: white;
  text-align: center;
}
h1 {
  padding-top: 30px;
  font-size: 40px;
}
#totalVotes {
  font-size: 24px;
  margin-bottom: 30px;
}
.result {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px auto;
  width: 60%;
}
.medaglia {
  font-size: 30px;
  width: 50px;
}
.progetto {
  text-align: left;
  flex: 1;
  font-size: 24px;
}
.barContainer {
  background: rgba(255,255,255,0.2);
  width: 300px;
  height: 30px;
  border-radius: 15px;
  overflow: hidden;
  margin-left: 15px;
}
.bar {
  background: #ffc107;
  height: 100%;
  width: 0%;
  border-radius: 15px;
  transition: width 0.5s;
  text-align: right;
  padding-right: 5px;
  box-sizing: border-box;
  color: black;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>Risultati in Diretta</h1>
<div id="totalVotes">Totale dei voti raccolti: 0</div>
<div id="resultsContainer"></div>

<script>
// Icone medaglie
const medaglie = ["🥇","🥈","🥉"];
const container = document.getElementById("resultsContainer");
let maxVotes = 0;

// Funzione per aggiornare i risultati
async function aggiornaRisultati() {
  const res = await fetch("/results");
  const data = await res.json();

  // Calcola totale voti
  const totale = data.reduce((acc,d) => acc + d.votes, 0);
  document.getElementById("totalVotes").innerText = `Totale dei voti raccolti: ${totale}`;

  // Ordina per numero voti decrescente
  data.sort((a,b) => b.votes - a.votes);
  maxVotes = data.length ? data[0].votes : 1;

  // Pulisce container
  container.innerHTML = "";

  // Mostra top 3 con medaglie e barre
  data.forEach((d,i)=>{
    const row = document.createElement("div");
    row.className = "result";

    const med = document.createElement("div");
    med.className = "medaglia";
    med.innerText = i < 3 ? medaglie[i] : "";
    row.appendChild(med);

    const proj = document.createElement("div");
    proj.className = "progetto";
    proj.innerText = d.choice;
    row.appendChild(proj);

    const barContainer = document.createElement("div");
    barContainer.className = "barContainer";

    const bar = document.createElement("div");
    bar.className = "bar";
    const perc = Math.round((d.votes/maxVotes)*100);
    bar.style.width = perc + "%";
    bar.innerText = d.votes;

    barContainer.appendChild(bar);
    row.appendChild(barContainer);

    container.appendChild(row);
  });
}

// Aggiorna ogni 3 secondi
aggiornaRisultati();
setInterval(aggiornaRisultati, 3000);
</script>

</body>
</html>
