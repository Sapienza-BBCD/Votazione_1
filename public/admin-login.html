<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Login Admin - LAB2GO</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #007BFF;
    font-family: Arial, sans-serif;
    color: white;
    margin: 0;
  }

  .login-box {
    background: white;
    color: black;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    text-align: center;
    width: 320px;
  }

  h1 {
    margin-bottom: 24px;
  }

  input[type="password"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #007BFF;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #0056b3;
  }

  .error {
    color: red;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="login-box">
  <h1>Login Admin</h1>
  <div class="error" id="error"></div>
  <input type="password" id="password" placeholder="Inserisci la password">
  <button id="loginBtn">Accedi</button>
</div>

<script>
document.getElementById("loginBtn").addEventListener("click", async () => {
  const password = document.getElementById("password").value;

  const res = await fetch("/admin-login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (data.success) {
    // Password corretta → reindirizza alla pagina admin
    window.location.href = "/admin-main.html"; // qui metti il tuo admin principale con i pulsanti
  } else {
    document.getElementById("error").textContent = "Password errata";
  }
});
</script>

</body>
</html>
