<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Risultati Votazione - LAB2GO</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f6f8;
  margin: 0;
  padding: 20px;
}

h1 {
  font-size: 36px;
  margin-bottom: 30px;
}

.project {
  margin: 20px auto;
  width: 60%;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.project-name {
  font-size: 20px;
  margin-bottom: 10px;
}

.bar-container {
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  height: 30px;
}

.bar {
  background: #007BFF;
  height: 100%;
  width: 0;
  text-align: right;
  color: white;
  line-height: 30px;
  padding-right: 10px;
  font-weight: bold;
  transition: width 1s;
}
</style>
</head>
<body>

<h1>Risultati Votazione - LAB2GO</h1>

<div id="results"></div>

<script>
// Prende i risultati dal server
async function loadResults() {
  const res = await fetch("/results");
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  // Trova il numero massimo di voti per scala della barra
  let maxVotes = 0;
  data.forEach(d => { if(d.votes > maxVotes) maxVotes = d.votes; });

  data.forEach((d) => {
    const div = document.createElement("div");
    div.className = "project";

    const name = document.createElement("div");
    name.className = "project-name";
    name.textContent = `${d.choice}: ${d.votes} voti`;
    div.appendChild(name);

    const barContainer = document.createElement("div");
    barContainer.className = "bar-container";

    const bar = document.createElement("div");
    bar.className = "bar";
    // Percentuale proporzionale al massimo dei voti
    const percent = maxVotes > 0 ? (d.votes / maxVotes) * 100 : 0;
    bar.style.width = percent + "%";
    bar.textContent = d.votes > 0 ? d.votes : "";
    barContainer.appendChild(bar);

    div.appendChild(barContainer);

    container.appendChild(div);
  });
}

loadResults();
</script>

</body>
</html>
