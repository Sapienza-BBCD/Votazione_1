<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin - Gestione Votazione</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0d6efd;
  color: white;
  text-align: center;
  margin: 0;
  padding: 0;
}
h1 {
  margin-top: 40px;
  font-size: 36px;
}
.container {
  margin-top: 30px;
}
button {
  margin: 15px;
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  opacity: 0.9;
}
.btn-open { background: #28a745; color: white; }
.btn-close { background: #dc3545; color: white; }
.btn-reset { background: #ffc107; color: black; }
.btn-qr { background: #17a2b8; color: white; }
.btn-results { background: #6610f2; color: white; }
</style>
</head>
<body>

<h1>Gestione Votazione LAB2GO</h1>

<div class="container" id="adminPanel" style="display:none;">
  <button class="btn-open" onclick="fetch('/open-vote').then(r=>r.text()).then(alert)">Apri Votazione</button>
  <button class="btn-close" onclick="fetch('/close-vote').then(r=>r.text()).then(alert)">Chiudi Votazione</button>
  <button class="btn-reset" onclick="fetch('/reset-vote').then(r=>r.text()).then(alert)">Reset Votazione</button>
  <br>
  <button class="btn-qr" onclick="window.open('/download-qrs')">Download QR ZIP</button>
  <button class="btn-qr" onclick="window.open('/print-qrs')">Download PDF QR</button>
  <br>
  <button class="btn-results" onclick="window.open('/results-view')">Visualizza Risultati Live</button>
</div>

<script>
// Prompt password all'accesso
const ADMIN_PASSWORD = "lab2go";  // Deve coincidere con quella in server.js
let pass = prompt("Inserisci password per accedere all'admin:");

if(pass === ADMIN_PASSWORD){
  document.getElementById("adminPanel").style.display = "block";
} else {
  alert("Password errata. Accesso negato.");
  document.body.innerHTML = "<h1>Accesso Negato</h1>";
}
</script>

</body>
</html>
