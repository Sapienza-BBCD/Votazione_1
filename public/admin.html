<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Risultati votazione</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
margin:0;
}

h1{
font-size:42px;
margin-top:40px;
margin-bottom:40px;
}

.container{
width:60%;
margin:auto;
}

.row{
margin:25px 0;
text-align:left;
}

.label{
font-size:24px;
margin-bottom:5px;
}

.barBackground{
width:100%;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.bar{
height:35px;
background:#007BFF;
width:0%;
color:white;
display:flex;
align-items:center;
justify-content:flex-end;
padding-right:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Risultati votazione</h1>

<div class="container" id="results"></div>

<script>

async function loadResults(){

const res = await fetch("/results");
const data = await res.json();

let maxVotes = 0;

data.forEach(p=>{
if(p.votes > maxVotes){
maxVotes = p.votes;
}
});

let html = "";

data.forEach(p=>{

let percent = maxVotes ? (p.votes/maxVotes)*100 : 0;

html += `
<div class="row">

<div class="label">
${p.choice} — ${p.votes} voti
</div>

<div class="barBackground">
<div class="bar" style="width:${percent}%">
${p.votes}
</div>
</div>

</div>
`;

});

document.getElementById("results").innerHTML = html;

}

loadResults();

setInterval(loadResults,3000);

</script>

</body>

</html>
