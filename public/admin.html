<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dashboard Admin - LAB2GO</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 0;
    color: #333;
}

header {
    background: #007bff;
    color: white;
    padding: 15px 30px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    margin-bottom: 30px;
    color: #007bff;
}

button {
    background: #007bff;
    color: white;
    border: none;
    padding: 12px 25px;
    margin: 10px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #0056b3;
}

.status {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: green;
}
</style>
</head>
<body>

<header>Admin Dashboard - LAB2GO</header>

<div class="container">

<h2>Gestione Votazione</h2>

<div id="buttons">
    <button onclick="apriVotazione()">Apri Votazione</button>
    <button onclick="chiudiVotazione()">Chiudi Votazione</button>
    <button onclick="resetVotazione()">Reset Votazione</button>
    <button onclick="location.href='/download-qrs'">Download QR ZIP</button>
    <button onclick="location.href='/print-qrs'">Stampa PDF QR</button>
    <button onclick="location.href='/results-view'">Risultati Live</button>
    <button onclick="location.href='/admin/dashboard'">Dashboard</button>
</div>

<p class="status" id="statusMsg">Stato votazione: caricamento...</p>

</div>

<script>
// Aggiorna lo stato iniziale della votazione
let stato = "pre";

function aggiornaStato(msg, color="green") {
    const status = document.getElementById("statusMsg");
    status.innerText = "Stato votazione: " + msg;
    status.style.color = color;
}

// Funzioni per aprire/chiudere/reset votazione
async function apriVotazione() {
    const res = await fetch("/open-vote");
    const text = await res.text();
    aggiornaStato("APERTA");
    alert(text);
}

async function chiudiVotazione() {
    const res = await fetch("/close-vote");
    const text = await res.text();
    aggiornaStato("CHIUSA", "red");
    alert(text);
}

async function resetVotazione() {
    const res = await fetch("/reset-vote");
    const text = await res.text();
    aggiornaStato("NON ANCORA APERTA", "orange");
    alert(text);
}

// Facoltativo: puoi fare fetch iniziale per conoscere lo stato reale dal server
// fetch("/vote-status").then(r=>r.json()).then(data => aggiornaStato(data.stato));
</script>

</body>
</html>
