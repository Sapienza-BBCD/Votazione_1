<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Pannello Admin - Votazione LAB2GO</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
margin:0;
}

h1{
margin-top:40px;
font-size:36px;
}

.container{
margin-top:50px;
}

button{
display:block;
margin:15px auto;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
width:300px;
}

.open{
background:#28a745;
color:white;
}

.close{
background:#dc3545;
color:white;
}

.reset{
background:#ffc107;
}

.results{
background:#007bff;
color:white;
}

.qr{
background:#6c757d;
color:white;
}

button:hover{
opacity:0.9;
}

.status{
margin-top:30px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Pannello di controllo votazione</h1>

<div class="container">

<button class="open" onclick="openVote()">🟢 Apri votazione</button>

<button class="close" onclick="closeVote()">🔴 Chiudi votazione</button>

<button class="reset" onclick="resetVote()">🔄 Reset votazione</button>

<button class="results" onclick="window.open('/results-view','_blank')">
📊 Risultati live
</button>

<button class="qr" onclick="window.open('/download-qrs','_blank')">
📥 Scarica QR
</button>

<button class="qr" onclick="window.open('/print-qrs','_blank')">
🖨 Stampa QR
</button>

<div class="status" id="status"></div>

</div>

<script>

async function openVote(){

const res = await fetch("/open-vote");
const text = await res.text();

document.getElementById("status").innerText = text;

}

async function closeVote(){

const res = await fetch("/close-vote");
const text = await res.text();

document.getElementById("status").innerText = text;

}

async function resetVote(){

const res = await fetch("/reset-vote");
const text = await res.text();

document.getElementById("status").innerText = text;

}

</script>

</body>
</html>
