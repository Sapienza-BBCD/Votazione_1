<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Risultati Live - LAB2GO</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

h1{
font-size:50px;
margin-top:20px;
}

#totalVotes{
font-size:28px;
margin-bottom:20px;
color:#38bdf8;
}

#results{
width:70%;
margin:auto;
}

.project{
margin-bottom:35px;
}

.rank{
font-size:28px;
margin-bottom:5px;
}

.label{
font-size:26px;
margin-bottom:5px;
}

.bar-container{
width:100%;
background:#1e293b;
border-radius:12px;
overflow:hidden;
}

.bar{
height:45px;
background:#38bdf8;
text-align:right;
padding-right:12px;
line-height:45px;
font-size:22px;
font-weight:bold;
transition:width 0.8s;
}

.leader{
background:#22c55e !important;
}

</style>

</head>

<body>

<h1>📊 Risultati in Diretta</h1>

<div id="totalVotes"></div>

<div id="results"></div>

<script>

let lastLeader = "";

async function loadResults(){

const res = await fetch("/results");
const data = await res.json();

data.sort((a,b)=>b.votes-a.votes);

let maxVotes = 0;
let totalVotes = 0;

data.forEach(p=>{
if(p.votes>maxVotes) maxVotes=p.votes;
totalVotes += p.votes;
});

document.getElementById("totalVotes").innerHTML =
"Totale voti raccolti: <b>"+totalVotes+"</b>";

let container = document.getElementById("results");
container.innerHTML="";

data.forEach((p,i)=>{

let percent = maxVotes ? (p.votes/maxVotes)*100 : 0;

let medal="";
if(i===0) medal="🥇";
if(i===1) medal="🥈";
if(i===2) medal="🥉";

let leaderClass = i===0 ? "leader" : "";

if(i===0 && lastLeader !== p.choice){
document.body.style.background="#1e293b";
setTimeout(()=>{
document.body.style.background="#0f172a";
},500);
lastLeader = p.choice;
}

let div = document.createElement("div");
div.className="project";

div.innerHTML = `
<div class="rank">${medal} ${i+1}° posto</div>
<div class="label">${p.choice}</div>
<div class="bar-container">
<div class="bar ${leaderClass}" style="width:${percent}%">${p.votes} voti</div>
</div>
`;

container.appendChild(div);

});

}

loadResults();

setInterval(loadResults,3000);

// modalità schermo pieno
document.body.addEventListener("click",()=>{
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}
});

</script>

</body>
</html>
