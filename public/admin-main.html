<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Gestione Votazione - LAB2GO</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #007BFF;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    margin-top: 40px;
    font-size: 48px;
    text-align: center;
  }

  .total-votes {
    font-size: 24px;
    margin: 20px 0;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 40px;
  }

  .buttons button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: white;
    color: #007BFF;
    transition: 0.2s;
  }

  .buttons button:hover {
    background: #e0e0e0;
  }

  .project-bar {
    width: 80%;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    margin: 15px 0;
    height: 40px;
    position: relative;
  }

  .project-fill {
    background: #FFD700; /* oro */
    height: 100%;
    border-radius: 12px;
    width: 0%;
    text-align: right;
    padding-right: 10px;
    box-sizing: border-box;
    color: black;
    font-weight: bold;
    line-height: 40px;
  }

  .project-label {
    position: absolute;
    left: 15px;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Gestione Votazione</h1>
<div class="total-votes">Totale voti raccolti: <span id="totalVotes">0</span></div>

<div class="buttons">
  <button onclick="apriVotazione()">Apri Votazione</button>
  <button onclick="chiudiVotazione()">Chiudi Votazione</button>
  <button onclick="resetVotazione()">Reset</button>
  <button onclick="window.open('/results-view','_blank')">Risultati Live</button>
  <button onclick="window.open('/download-qrs','_blank')">Download QR ZIP</button>
  <button onclick="window.open('/print-qrs','_blank')">Stampa PDF QR</button>
</div>

<div id="projectsContainer">
  <!-- Qui le barre dei progetti -->
</div>

<script>
const projectsContainer = document.getElementById("projectsContainer");
let projects = [];

// Funzione per caricare i voti e aggiornare le barre
async function updateVotes() {
  const res = await fetch("/results");
  const data = await res.json();

  // Calcolo totale voti
  const totalVotes = data.reduce((sum, p) => sum + p.votes, 0);
  document.getElementById("totalVotes").textContent = totalVotes;

  // Ordina i progetti per numero di voti decrescente
  data.sort((a,b) => b.votes - a.votes);

  projectsContainer.innerHTML = "";

  data.forEach(p => {
    const barWrapper = document.createElement("div");
    barWrapper.className = "project-bar";

    const label = document.createElement("div");
    label.className = "project-label";
    label.textContent = p.choice;

    const fill = document.createElement("div");
    fill.className = "project-fill";
    fill.style.width = totalVotes ? (p.votes/totalVotes*100) + "%" : "0%";
    fill.textContent = p.votes + " voti";

    barWrapper.appendChild(label);
    barWrapper.appendChild(fill);
    projectsContainer.appendChild(barWrapper);
  });
}

// Funzioni pulsanti
async function apriVotazione() {
  await fetch("/open-vote");
  alert("Votazione APERTA");
}

async function chiudiVotazione() {
  await fetch("/close-vote");
  alert("Votazione CHIUSA");
}

async function resetVotazione() {
  await fetch("/reset-vote");
  alert("Votazione resettata");
}

// Aggiorna voti ogni 5 secondi
updateVotes();
setInterval(updateVotes, 5000);
</script>

</body>
</html>
